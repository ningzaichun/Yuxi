x-api-worker-env: &api-worker-env
  HOST_IP: ${HOST_IP:?Set HOST_IP to the infrastructure server host in .env.app.dev}
  LITE_MODE: ${LITE_MODE:-false}
  RUNNING_IN_DOCKER: "true"
  YUXI_ENV: development
  POSTGRES_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env.app.dev}
  REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.app.dev}
  NEO4J_URI: ${NEO4J_URI:?Set NEO4J_URI in .env.app.dev}
  NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.app.dev}
  MILVUS_URI: ${MILVUS_URI:?Set MILVUS_URI in .env.app.dev}
  MILVUS_DB: ${MILVUS_DB:-yuxi}
  MILVUS_TOKEN: ${MILVUS_TOKEN:-}
  MINIO_URI: ${MINIO_URI:?Set MINIO_URI in .env.app.dev}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env.app.dev}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env.app.dev}
  MINERU_API_URI: ${MINERU_API_URI:-}
  PADDLEX_URI: ${PADDLEX_URI:-}
  YUXI_DOCKER_API_BASE: ${YUXI_DOCKER_API_BASE:-http://localhost}
  SANDBOX_PROVIDER: provisioner
  SANDBOX_PROVISIONER_URL: http://sandbox-provisioner:8002
  SANDBOX_VIRTUAL_PATH_PREFIX: ${SANDBOX_VIRTUAL_PATH_PREFIX:-/home/gem/user-data}
  SANDBOX_EXEC_TIMEOUT_SECONDS: ${SANDBOX_EXEC_TIMEOUT_SECONDS:-180}
  SANDBOX_MAX_OUTPUT_BYTES: ${SANDBOX_MAX_OUTPUT_BYTES:-262144}
  EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-600}
  LLM_TIMEOUT: ${LLM_TIMEOUT:-600}
  RUN_CANCEL_KEY_TTL_SECONDS: ${RUN_CANCEL_KEY_TTL_SECONDS:-1800}
  RUN_EVENTS_STREAM_TTL_SECONDS: ${RUN_EVENTS_STREAM_TTL_SECONDS:-7200}
  YUXI_CORS_ORIGINS: ${YUXI_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env.app.dev}
  YUXI_INSTANCE_ID: ${YUXI_INSTANCE_ID:?Set YUXI_INSTANCE_ID in .env.app.dev}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,sandbox-provisioner,api.siliconflow.cn}
  no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,sandbox-provisioner,api.siliconflow.cn}

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: yuxi-api:${YUXI_VERSION:-0.7.1.beta1}
    container_name: api-split-dev
    working_dir: /app
    volumes:
      - ./backend/server:/app/server
      - ./backend/package:/app/package
      - ./docker/volumes/yuxi:/app/saves
      - ./docker/volumes/models:/app/models
      - ./backend/test:/app/test
      - ./backend/scripts:/app/scripts
      - ./docker/sandbox_provisioner:/app/docker/sandbox_provisioner:ro
      - ./deploy/split/.env.app.dev:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - split_nltk_data:/root/nltk_data
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${API_PORT:-5050}:5050"
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${APP_ENV_FILE:-./deploy/split/.env.app.dev}
    environment:
      <<: *api-worker-env
    command: uv run --no-sync --no-dev uvicorn server.main:app --host 0.0.0.0 --port 5050 --reload --reload-dir /app/server --reload-dir /app/package
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5050/api/system/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 180s
    depends_on:
      sandbox-provisioner:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: yuxi-api:${YUXI_VERSION:-0.7.1.beta1}
    container_name: worker-split-dev
    working_dir: /app
    volumes:
      - ./backend/server:/app/server
      - ./backend/package:/app/package
      - ./docker/volumes/yuxi:/app/saves
      - ./docker/volumes/models:/app/models
      - ./backend/test:/app/test
      - ./backend/scripts:/app/scripts
      - ./docker/sandbox_provisioner:/app/docker/sandbox_provisioner:ro
      - ./deploy/split/.env.app.dev:/app/.env:ro
      - ./backend/pyproject.toml:/app/pyproject.toml
      - ./backend/uv.lock:/app/uv.lock
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${APP_ENV_FILE:-./deploy/split/.env.app.dev}
    environment:
      <<: *api-worker-env
    command: watchfiles --filter python "arq server.worker_main.WorkerSettings" /app/server /app/package
    restart: unless-stopped
    depends_on:
      sandbox-provisioner:
        condition: service_healthy

  sandbox-provisioner:
    build:
      context: ./docker/sandbox_provisioner
      dockerfile: Dockerfile
    image: yuxi-sandbox-provisioner:${YUXI_VERSION:-0.7.1.beta1}
    container_name: sandbox-provisioner-split-dev
    volumes:
      - ./docker/volumes/yuxi:/app/saves
      - ./docker/sandbox_provisioner/app.py:/app/app.py:ro
      - ./docker/sandbox_provisioner/sandbox.env:/app/sandbox.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${SANDBOX_PROVISIONER_PORT:-8002}:8002"
    networks:
      app-network:
        aliases:
          - sandbox-provisioner
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROVISIONER_BACKEND: ${SANDBOX_PROVISIONER_BACKEND:-docker}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest}
      SANDBOX_CONTAINER_PORT: ${SANDBOX_CONTAINER_PORT:-8080}
      MEMORY_SANDBOX_URL_TEMPLATE: ${MEMORY_SANDBOX_URL_TEMPLATE:-http://agent-sandbox:8000}
      SANDBOX_HEALTH_TIMEOUT_SECONDS: ${SANDBOX_HEALTH_TIMEOUT_SECONDS:-300}
      SANDBOX_IDLE_TIMEOUT_SECONDS: ${SANDBOX_IDLE_TIMEOUT_SECONDS:-120}
      SANDBOX_IDLE_CHECK_INTERVAL_SECONDS: ${SANDBOX_IDLE_CHECK_INTERVAL_SECONDS:-10}
      SANDBOX_EXEC_TIMEOUT_SECONDS: ${SANDBOX_EXEC_TIMEOUT_SECONDS:-180}
      HTTP_PROXY: ${SANDBOX_HTTP_PROXY:-}
      HTTPS_PROXY: ${SANDBOX_HTTPS_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,host.docker.internal
      DOCKER_NETWORK: ${SANDBOX_DOCKER_NETWORK:-yuxi-split-app-network}
      DOCKER_THREADS_HOST_PATH: ${SANDBOX_DOCKER_THREADS_HOST_PATH:-}
      DOCKER_SANDBOX_PREFIX: ${SANDBOX_DOCKER_SANDBOX_PREFIX:-yuxi-split-sandbox}
      DOCKER_SANDBOX_HOST: ${SANDBOX_DOCKER_SANDBOX_HOST:-host.docker.internal}
      K8S_NAMESPACE: ${SANDBOX_K8S_NAMESPACE:-yuxi-know}
      NODE_HOST: ${SANDBOX_NODE_HOST:-host.docker.internal}
      KUBECONFIG_PATH: ${KUBECONFIG_PATH:-}
      THREAD_PVC: ${THREAD_PVC:-yuxi-thread}
      SKILLS_PVC: ${SKILLS_PVC:-yuxi-skills}
    command: >
      sh -lc "python -c 'import docker' >/dev/null 2>&1 || pip install --no-cache-dir 'docker>=7.1.0';
      uvicorn app:app --host 0.0.0.0 --port 8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: development
    image: yuxi-web:${YUXI_VERSION:-0.7.1.beta1}
    container_name: web-split-dev
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - ./web/vite.config.js:/app/vite.config.js
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    networks:
      - app-network
    environment:
      NODE_ENV: development
      VITE_API_URL: http://api:5050
      VITE_USE_RUNS_API: ${VITE_USE_RUNS_API:-false}
      VITE_LITE_MODE: ${LITE_MODE:-false}
    command: pnpm run server
    restart: unless-stopped

volumes:
  split_nltk_data:

networks:
  app-network:
    name: yuxi-split-app-network
    driver: bridge
