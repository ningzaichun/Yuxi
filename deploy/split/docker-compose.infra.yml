services:
  postgres:
    image: postgres:16
    container_name: yuxi-infra-postgres
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.infra}
      POSTGRES_DB: ${POSTGRES_DB:-yuxi}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - infra-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yuxi-infra-redis
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.infra}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.infra}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - infra-network
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: yuxi-infra-minio
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env.infra}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env.infra}
    command: minio server /minio_data --address 0.0.0.0:9000 --console-address 0.0.0.0:9001
    volumes:
      - minio_data:/minio_data
      - minio_config:/root/.minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - infra-network
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: yuxi-infra-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - infra-network
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.6
    container_name: yuxi-infra-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${MILVUS_PORT:-19530}:19530"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${MILVUS_HEALTH_PORT:-9091}:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env.infra}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env.infra}
      MILVUS_LOG_LEVEL: ${MILVUS_LOG_LEVEL:-error}
    volumes:
      - milvus_data:/var/lib/milvus
      - milvus_logs:/var/lib/milvus/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - infra-network
    restart: unless-stopped

  graph:
    image: neo4j:5.26
    container_name: yuxi-infra-neo4j
    ports:
      - "${INFRA_BIND_HOST:-127.0.0.1}:${NEO4J_HTTP_PORT:-7474}:7474"
      - "${INFRA_BIND_HOST:-127.0.0.1}:${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.infra}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.infra}
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_listen__address: 0.0.0.0:7474
      ENTITY_EMBEDDING: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u \"$$NEO4J_USERNAME\" -p \"$$NEO4J_PASSWORD\" 'RETURN 1;' >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - infra-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  minio_config:
  etcd_data:
  milvus_data:
  milvus_logs:
  neo4j_data:
  neo4j_logs:

networks:
  infra-network:
    name: yuxi-split-infra-network
    driver: bridge
