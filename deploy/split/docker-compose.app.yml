x-api-worker-env: &api-worker-env
  LITE_MODE: ${LITE_MODE:-false}
  RUNNING_IN_DOCKER: "true"
  YUXI_ENV: production
  PYTHONPATH: /app/package
  POSTGRES_URL: ${POSTGRES_URL:?Set POSTGRES_URL in .env.app}
  REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.app}
  NEO4J_URI: ${NEO4J_URI:?Set NEO4J_URI in .env.app}
  NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env.app}
  MILVUS_URI: ${MILVUS_URI:?Set MILVUS_URI in .env.app}
  MILVUS_DB: ${MILVUS_DB:-yuxi}
  MILVUS_TOKEN: ${MILVUS_TOKEN:-}
  MINIO_URI: ${MINIO_URI:?Set MINIO_URI in .env.app}
  MINIO_PUBLIC_URI: ${MINIO_PUBLIC_URI:?Set MINIO_PUBLIC_URI in .env.app}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env.app}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env.app}
  MINERU_API_URI: ${MINERU_API_URI:-}
  PADDLEX_URI: ${PADDLEX_URI:-}
  SANDBOX_PROVIDER: provisioner
  SANDBOX_PROVISIONER_URL: http://sandbox-provisioner:8002
  SANDBOX_VIRTUAL_PATH_PREFIX: ${SANDBOX_VIRTUAL_PATH_PREFIX:-/home/gem/user-data}
  SANDBOX_EXEC_TIMEOUT_SECONDS: ${SANDBOX_EXEC_TIMEOUT_SECONDS:-180}
  SANDBOX_MAX_OUTPUT_BYTES: ${SANDBOX_MAX_OUTPUT_BYTES:-262144}
  EMBEDDING_TIMEOUT: ${EMBEDDING_TIMEOUT:-600}
  LLM_TIMEOUT: ${LLM_TIMEOUT:-600}
  RUN_CANCEL_KEY_TTL_SECONDS: ${RUN_CANCEL_KEY_TTL_SECONDS:-1800}
  RUN_EVENTS_STREAM_TTL_SECONDS: ${RUN_EVENTS_STREAM_TTL_SECONDS:-7200}
  YUXI_CORS_ORIGINS: ${YUXI_CORS_ORIGINS:-}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env.app}
  YUXI_INSTANCE_ID: ${YUXI_INSTANCE_ID:?Set YUXI_INSTANCE_ID in .env.app}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,sandbox-provisioner,api.siliconflow.cn}
  no_proxy: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,sandbox-provisioner,api.siliconflow.cn}

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: yuxi-api:${YUXI_VERSION:-0.7.1.beta1}
    container_name: yuxi-app-api
    working_dir: /app
    volumes:
      - app_saves:/app/saves
      - app_models:/app/models
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${APP_ENV_FILE:-./deploy/split/.env.app}
    environment:
      <<: *api-worker-env
    command: uv run --no-sync --no-dev uvicorn server.main:app --host 0.0.0.0 --port 5050
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5050/api/system/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 180s
    depends_on:
      sandbox-provisioner:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: yuxi-api:${YUXI_VERSION:-0.7.1.beta1}
    container_name: yuxi-app-worker
    working_dir: /app
    volumes:
      - app_saves:/app/saves
      - app_models:/app/models
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ${APP_ENV_FILE:-./deploy/split/.env.app}
    environment:
      <<: *api-worker-env
    command: uv run --no-sync --no-dev arq server.worker_main.WorkerSettings
    depends_on:
      sandbox-provisioner:
        condition: service_healthy
    restart: unless-stopped

  sandbox-provisioner:
    build:
      context: ./docker/sandbox_provisioner
      dockerfile: Dockerfile
    image: yuxi-sandbox-provisioner:${YUXI_VERSION:-0.7.1.beta1}
    container_name: yuxi-app-sandbox-provisioner
    volumes:
      - app_saves:/app/saves
      - ./docker/sandbox_provisioner/sandbox.env:/app/sandbox.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      app-network:
        aliases:
          - sandbox-provisioner
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROVISIONER_BACKEND: ${SANDBOX_PROVISIONER_BACKEND:-docker}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest}
      SANDBOX_CONTAINER_PORT: ${SANDBOX_CONTAINER_PORT:-8080}
      MEMORY_SANDBOX_URL_TEMPLATE: ${MEMORY_SANDBOX_URL_TEMPLATE:-http://agent-sandbox:8000}
      SANDBOX_HEALTH_TIMEOUT_SECONDS: ${SANDBOX_HEALTH_TIMEOUT_SECONDS:-300}
      SANDBOX_IDLE_TIMEOUT_SECONDS: ${SANDBOX_IDLE_TIMEOUT_SECONDS:-120}
      SANDBOX_IDLE_CHECK_INTERVAL_SECONDS: ${SANDBOX_IDLE_CHECK_INTERVAL_SECONDS:-10}
      SANDBOX_EXEC_TIMEOUT_SECONDS: ${SANDBOX_EXEC_TIMEOUT_SECONDS:-180}
      HTTP_PROXY: ${SANDBOX_HTTP_PROXY:-}
      HTTPS_PROXY: ${SANDBOX_HTTPS_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,host.docker.internal
      DOCKER_NETWORK: ${SANDBOX_DOCKER_NETWORK:-}
      DOCKER_THREADS_HOST_PATH: ${SANDBOX_DOCKER_THREADS_HOST_PATH:-}
      DOCKER_SANDBOX_PREFIX: ${SANDBOX_DOCKER_SANDBOX_PREFIX:-yuxi-app-sandbox}
      DOCKER_SANDBOX_HOST: ${SANDBOX_DOCKER_SANDBOX_HOST:-host.docker.internal}
      K8S_NAMESPACE: ${SANDBOX_K8S_NAMESPACE:-yuxi-know}
      NODE_HOST: ${SANDBOX_NODE_HOST:-host.docker.internal}
      KUBECONFIG_PATH: ${KUBECONFIG_PATH:-}
      THREAD_PVC: ${THREAD_PVC:-yuxi-thread}
      SKILLS_PVC: ${SKILLS_PVC:-yuxi-skills}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      target: production
    image: yuxi-web:${YUXI_VERSION:-0.7.1.beta1}
    container_name: yuxi-app-web
    ports:
      - "${APP_BIND_HOST:-127.0.0.1}:${APP_HTTP_PORT:-8080}:80"
    networks:
      - app-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  app_saves:
  app_models:

networks:
  app-network:
    name: yuxi-split-app-network
    driver: bridge
